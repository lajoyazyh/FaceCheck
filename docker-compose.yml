services:
  postgres:
    image: postgres:16-alpine
    pull_policy: missing
    container_name: facecheck-postgres
    environment:
      POSTGRES_DB: facecheck
      POSTGRES_USER: facecheck
      POSTGRES_PASSWORD: facecheck
      TZ: UTC
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U facecheck -d facecheck"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    pull_policy: missing
    container_name: facecheck-redis
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "26379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - redis-data:/data

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    pull_policy: missing
    container_name: facecheck-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: facecheck
      RABBITMQ_DEFAULT_PASS: facecheck
      TZ: UTC
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 15s
      timeout: 10s
      retries: 5
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq

volumes:
  postgres-data:
  redis-data:
  rabbitmq-data:
