spring:
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 20MB
  application:
    name: facecheck-backend
  jackson:
    default-property-inclusion: non_null
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/facecheck}
    username: ${DB_USERNAME:facecheck}
    password: ${DB_PASSWORD:facecheck}
    driver-class-name: org.postgresql.Driver
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration
    placeholders:
      seed_local_test_data_enabled: false
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 2s
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:facecheck}
    password: ${RABBITMQ_PASSWORD:facecheck}

server:
  shutdown: graceful
  error:
    include-message: never

management:
  endpoints:
    web:
      exposure:
        include: health,info

facecheck:
  security:
    jwt:
      issuer: ${JWT_ISSUER:facecheck}
      secret: ${JWT_SECRET:replace-with-a-long-random-secret}
      expires-minutes: ${JWT_EXPIRES_MINUTES:120}
    login-rate-limit:
      window-seconds: ${LOGIN_RATE_LIMIT_WINDOW_SECONDS:300}
      max-failed-attempts: ${LOGIN_RATE_LIMIT_MAX_FAILED_ATTEMPTS:5}
  huawei:
    enabled: ${HUAWEI_CLOUD_ENABLED:false}
    obs-enabled: ${OBS_ENABLED:false}
    ak: ${FRS_AK:}
    sk: ${FRS_SK:}
    obs-ak: ${OBS_AK:}
    obs-sk: ${OBS_SK:}
    project-id: ${FRS_PROJECT_ID:}
    region: ${FRS_REGION:}
    frs-endpoint: ${FRS_ENDPOINT:}
    obs-endpoint: ${OBS_ENDPOINT:}
    obs-region: ${OBS_REGION:}
    obs-bucket: ${OBS_BUCKET:}
    face-set-name: ${FRS_FACE_SET_NAME:facecheck-default}
    similarity-threshold: ${FRS_SIMILARITY_THRESHOLD:85}
  messaging:
    face-photo:
      register-queue: ${FACE_PHOTO_REGISTER_QUEUE:face.photo.register}
      register-retry-queue: ${FACE_PHOTO_REGISTER_RETRY_QUEUE:face.photo.register.retry}
      register-dlq-queue: ${FACE_PHOTO_REGISTER_DLQ_QUEUE:face.photo.register.dlq}
      delete-queue: ${FACE_PHOTO_DELETE_QUEUE:face.photo.delete.compensate}
      delete-retry-queue: ${FACE_PHOTO_DELETE_RETRY_QUEUE:face.photo.delete.compensate.retry}
      delete-dlq-queue: ${FACE_PHOTO_DELETE_DLQ_QUEUE:face.photo.delete.compensate.dlq}
      retry-ttl-ms: ${FACE_PHOTO_RETRY_TTL_MS:30000}
  checkin:
    rate-limit-window-seconds: ${CHECKIN_RATE_LIMIT_WINDOW_SECONDS:60}
    rate-limit-max-requests: ${CHECKIN_RATE_LIMIT_MAX_REQUESTS:5}
    idempotency-ttl-hours: ${CHECKIN_IDEMPOTENCY_TTL_HOURS:24}
    search-max-candidates: ${CHECKIN_SEARCH_MAX_CANDIDATES:3}
    next-poll-after-seconds: ${CHECKIN_NEXT_POLL_AFTER_SECONDS:3}
    async-enabled: ${CHECKIN_ASYNC_ENABLED:false}
