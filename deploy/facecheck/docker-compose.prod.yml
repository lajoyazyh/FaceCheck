services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB is required}
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      TZ: UTC
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--requirepass", "${REDIS_PASSWORD:?REDIS_PASSWORD is required}"]
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - redis-data:/data

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USERNAME:?RABBITMQ_USERNAME is required}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:?RABBITMQ_PASSWORD is required}
      TZ: UTC
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 15s
      timeout: 10s
      retries: 10
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq

  backend:
    build:
      context: ../../backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: ${APP_PROFILE:-prod}
      DB_URL: ${DB_URL:?DB_URL is required}
      DB_USERNAME: ${DB_USERNAME:?DB_USERNAME is required}
      DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
      RABBITMQ_HOST: ${RABBITMQ_HOST:-rabbitmq}
      RABBITMQ_PORT: ${RABBITMQ_PORT:-5672}
      RABBITMQ_USERNAME: ${RABBITMQ_USERNAME:?RABBITMQ_USERNAME is required}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:?RABBITMQ_PASSWORD is required}
      JWT_ISSUER: ${JWT_ISSUER:-facecheck}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      JWT_EXPIRES_MINUTES: ${JWT_EXPIRES_MINUTES:-120}
      LOGIN_RATE_LIMIT_WINDOW_SECONDS: ${LOGIN_RATE_LIMIT_WINDOW_SECONDS:-300}
      LOGIN_RATE_LIMIT_MAX_FAILED_ATTEMPTS: ${LOGIN_RATE_LIMIT_MAX_FAILED_ATTEMPTS:-5}
      HUAWEI_CLOUD_ENABLED: ${HUAWEI_CLOUD_ENABLED:-false}
      OBS_ENABLED: ${OBS_ENABLED:-false}
      FRS_AK: ${FRS_AK:-}
      FRS_SK: ${FRS_SK:-}
      OBS_AK: ${OBS_AK:-}
      OBS_SK: ${OBS_SK:-}
      FRS_PROJECT_ID: ${FRS_PROJECT_ID:-}
      FRS_REGION: ${FRS_REGION:-}
      FRS_ENDPOINT: ${FRS_ENDPOINT:-}
      FRS_FACE_SET_NAME: ${FRS_FACE_SET_NAME:-facecheck-default}
      FRS_SIMILARITY_THRESHOLD: ${FRS_SIMILARITY_THRESHOLD:-85}
      OBS_ENDPOINT: ${OBS_ENDPOINT:-}
      OBS_REGION: ${OBS_REGION:-}
      OBS_BUCKET: ${OBS_BUCKET:-}
      CHECKIN_RATE_LIMIT_WINDOW_SECONDS: ${CHECKIN_RATE_LIMIT_WINDOW_SECONDS:-60}
      CHECKIN_RATE_LIMIT_MAX_REQUESTS: ${CHECKIN_RATE_LIMIT_MAX_REQUESTS:-5}
      CHECKIN_IDEMPOTENCY_TTL_HOURS: ${CHECKIN_IDEMPOTENCY_TTL_HOURS:-24}
    ports:
      - "127.0.0.1:${FACECHECK_BACKEND_HOST_PORT:-18080}:8080"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8080/api/health"]
      interval: 15s
      timeout: 5s
      retries: 10

volumes:
  postgres-data:
  redis-data:
  rabbitmq-data:
