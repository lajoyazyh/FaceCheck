server {
    listen 8080;
    listen [::]:8080;
    server_name _;

    # Initial NJU campus allowlist inferred on 2026-06-16 from:
    # - www.nju.edu.cn -> 202.119.32.7
    # - RIPE Stat network-info for 202.119.32.7 -> 202.119.32.0/19
    # - www.nju.edu.cn AAAA -> 2001:da8:1007::9999
    # - RIPE Stat network-info for 2001:da8:1007::9999 -> 2001:da8:1007::/48
    allow 202.119.32.0/19;
    allow 2001:da8:1007::/48;
    allow 127.0.0.1;
    allow ::1;
    deny all;

    client_max_body_size 12m;
    proxy_read_timeout 300s;
    proxy_send_timeout 300s;
    proxy_connect_timeout 30s;

    access_log /var/log/nginx/facecheck-access.log;
    error_log /var/log/nginx/facecheck-error.log warn;

    location / {
        proxy_pass http://127.0.0.1:18080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
