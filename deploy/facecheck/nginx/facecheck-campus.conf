geo $facecheck_allowed_client {
    default 0;

    # Initial NJU campus allowlist inferred on 2026-06-16 from:
    # - www.nju.edu.cn -> 202.119.32.7
    # - RIPE Stat network-info for 202.119.32.7 -> 202.119.32.0/19
    # - www.nju.edu.cn AAAA -> 2001:da8:1007::9999
    # - RIPE Stat network-info for 2001:da8:1007::9999 -> 2001:da8:1007::/48
    202.119.32.0/19 1;
    2001:da8:1007::/48 1;
    121.236.0.0/16 1;
    58.192.0.0/16 1;
    173.230.153.233/32 1;
    # Developer/proxy egress IPs verified on 2026-06-25.
    85.237.206.10/32 1;
    85.237.206.105/32 1;
    127.0.0.1 1;
    ::1 1;
}

server {
    listen 80;
    listen [::]:80;
    listen 8080;
    listen [::]:8080;
    server_name _;

    if ($facecheck_allowed_client = 0) {
        return 403;
    }

    return 308 https://$host$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name _;

    if ($facecheck_allowed_client = 0) {
        return 403;
    }

    ssl_certificate /etc/facecheck/tls/facecheck-selfsigned.crt;
    ssl_certificate_key /etc/facecheck/tls/facecheck-selfsigned.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    client_max_body_size 12m;
    proxy_read_timeout 300s;
    proxy_send_timeout 300s;
    proxy_connect_timeout 30s;

    access_log /var/log/nginx/facecheck-access.log;
    error_log /var/log/nginx/facecheck-error.log warn;

    location / {
        proxy_pass http://127.0.0.1:18080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
