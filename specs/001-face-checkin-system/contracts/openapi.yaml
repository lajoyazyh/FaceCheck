openapi: 3.0.3
info:
  title: FaceCheck API
  version: 1.0.0
  description: |
    Spring Boot 单体后端对 Flutter App 暴露的首版接口契约。
    PostgreSQL 是唯一业务事实源；华为云 FRS 仅作为托管识别能力；
    华为云 OBS 仅作为图片对象存储。
servers:
  - url: https://api.example.com
    description: Production placeholder
  - url: http://localhost:8080
    description: Local development
tags:
  - name: Auth
  - name: Me
  - name: AdminUsers
  - name: AdminSessions
  - name: PublicCheckin
  - name: AdminReview
  - name: AdminSystem
paths:
  /api/auth/login:
    post:
      tags: [Auth]
      summary: Login as ordinary user or admin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login succeeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseLogin'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/auth/logout:
    post:
      tags: [Auth]
      summary: Logout current user and blacklist JWT
      security:
        - bearerAuth: []
      responses:
        '204':
          description: Logged out
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/me/profile:
    get:
      tags: [Me]
      summary: Get current user profile
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Profile returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseUserProfile'
        '401':
          $ref: '#/components/responses/Unauthorized'
    put:
      tags: [Me]
      summary: Update current user profile
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProfileRequest'
      responses:
        '200':
          description: Profile updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseUserProfile'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/me/face-photos:
    get:
      tags: [Me]
      summary: List current user's face photos
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Face photos returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseFacePhotoSummaryList'
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      tags: [Me]
      summary: Upload a face photo for current user
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
      responses:
        '202':
          description: Accepted for async registration
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseFacePhotoSummary'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          $ref: '#/components/responses/Conflict'

  /api/me/face-photos/{photoId}:
    delete:
      tags: [Me]
      summary: Disable and delete a face photo owned by current user
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/PhotoId'
      responses:
        '204':
          description: Photo deletion accepted
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/admin/users/{userId}/face-photos:
    get:
      tags: [AdminUsers]
      summary: List face photos for a managed user
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/UserId'
      responses:
        '200':
          description: Managed user face photos returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseFacePhotoSummaryList'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    post:
      tags: [AdminUsers]
      summary: Upload a face photo for a managed user
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/UserId'
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
      responses:
        '202':
          description: Accepted for async registration
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseFacePhotoSummary'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'

  /api/admin/users/{userId}/face-photos/{photoId}:
    delete:
      tags: [AdminUsers]
      summary: Disable and delete a face photo for a managed user
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/UserId'
        - $ref: '#/components/parameters/PhotoId'
      responses:
        '204':
          description: Photo deletion accepted
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/me/attendance-records:
    get:
      tags: [Me]
      summary: List current user's attendance records
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: from
          schema:
            type: string
            format: date-time
        - in: query
          name: to
          schema:
            type: string
            format: date-time
      responses:
        '200':
          description: Attendance history returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseMyAttendanceRecordSummaryList'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/admin/users:
    post:
      tags: [AdminUsers]
      summary: Create a managed user
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminCreateUserRequest'
      responses:
        '200':
          description: User created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseUserProfile'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/Conflict'

  /api/admin/users/{userId}:
    put:
      tags: [AdminUsers]
      summary: Update a managed user
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/UserId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminUpdateUserRequest'
      responses:
        '200':
          description: User updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseUserProfile'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'

  /api/admin/users/{userId}/disable:
    post:
      tags: [AdminUsers]
      summary: Disable a managed user
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/UserId'
      responses:
        '200':
          description: User disabled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseUserProfile'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/admin/sessions:
    get:
      tags: [AdminSessions]
      summary: List attendance sessions
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Session list returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseAttendanceSessionSummaryList'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
    post:
      tags: [AdminSessions]
      summary: Create an attendance session
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateAttendanceSessionRequest'
      responses:
        '201':
          description: Session created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseAttendanceSessionSummary'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /api/admin/sessions/{sessionId}:
    put:
      tags: [AdminSessions]
      summary: Update an attendance session
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/SessionId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateAttendanceSessionRequest'
      responses:
        '200':
          description: Session updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseAttendanceSessionSummary'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/admin/sessions/{sessionId}/publish:
    post:
      tags: [AdminSessions]
      summary: Publish a session
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/SessionId'
      responses:
        '200':
          description: Session published
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseAttendanceSessionSummary'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/admin/sessions/{sessionId}/close:
    post:
      tags: [AdminSessions]
      summary: Close a session
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/SessionId'
      responses:
        '200':
          description: Session closed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseAttendanceSessionSummary'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/admin/sessions/{sessionId}/cancel:
    post:
      tags: [AdminSessions]
      summary: Cancel a session
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/SessionId'
      responses:
        '200':
          description: Session canceled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseAttendanceSessionSummary'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/admin/sessions/{sessionId}/qr-token:
    get:
      tags: [AdminSessions]
      summary: Read current session QR token
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/SessionId'
      responses:
        '200':
          description: Current QR token returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseQrTokenResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/admin/sessions/{sessionId}/qr-token/reset:
    post:
      tags: [AdminSessions]
      summary: Regenerate current session QR token
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/SessionId'
      responses:
        '200':
          description: QR token reset
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseQrTokenResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/admin/attendance-records:
    get:
      tags: [AdminSessions]
      summary: List global attendance records
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: sessionId
          schema:
            type: string
            format: uuid
        - in: query
          name: userId
          schema:
            type: string
            format: uuid
        - in: query
          name: from
          schema:
            type: string
            format: date-time
        - in: query
          name: to
          schema:
            type: string
            format: date-time
        - in: query
          name: status
          schema:
            type: string
            enum: [VALID, MANUAL_CONFIRMED]
      responses:
        '200':
          description: Filtered attendance records returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseAttendanceRecordSummaryList'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /api/admin/sessions/{sessionId}/records:
    get:
      tags: [AdminSessions]
      summary: List attendance records under a session
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/SessionId'
        - in: query
          name: from
          schema:
            type: string
            format: date-time
        - in: query
          name: to
          schema:
            type: string
            format: date-time
        - in: query
          name: status
          schema:
            type: string
            enum: [VALID, MANUAL_CONFIRMED]
      responses:
        '200':
          description: Session attendance records returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseAttendanceRecordSummaryList'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /api/admin/checkin-attempts:
    get:
      tags: [AdminReview]
      summary: List abnormal or filtered check-in attempts
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: status
          schema:
            $ref: '#/components/schemas/CheckinStatus'
        - in: query
          name: resultCode
          schema:
            type: string
        - in: query
          name: sessionId
          schema:
            type: string
            format: uuid
        - in: query
          name: reviewed
          schema:
            type: boolean
      responses:
        '200':
          description: Attempt list returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseAdminCheckinAttemptList'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /api/admin/checkin-attempts/{attemptId}/review:
    post:
      tags: [AdminReview]
      summary: Append review note or mark an abnormal attempt reviewed
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/AttemptId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReviewCheckinAttemptRequest'
      responses:
        '200':
          description: Review state updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseAdminCheckinAttemptResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/admin/checkin-attempts/{attemptId}/retry:
    post:
      tags: [AdminReview]
      summary: Retry a failed or manual-review attempt
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/AttemptId'
      responses:
        '202':
          description: Retry accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseAdminCheckinAttemptResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/public/checkin/session-entry:
    post:
      tags: [PublicCheckin]
      summary: Resolve QR token into check-in session info
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SessionEntryRequest'
      responses:
        '200':
          description: Session entry info returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseSessionEntryResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/public/checkin/attempts:
    post:
      tags: [PublicCheckin]
      summary: Submit an unauthenticated check-in photo
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [qrToken, idempotencyKey, file]
              properties:
                qrToken:
                  type: string
                idempotencyKey:
                  type: string
                deviceId:
                  type: string
                file:
                  type: string
                  format: binary
      responses:
        '200':
          description: Final result returned synchronously
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseCheckinAttemptResponse'
        '202':
          description: Accepted and still processing
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseCheckinAttemptResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/TooManyRequests'

  /api/public/checkin/attempts/{attemptId}:
    get:
      tags: [PublicCheckin]
      summary: Query final result of a check-in attempt
      parameters:
        - $ref: '#/components/parameters/AttemptId'
      responses:
        '200':
          description: Attempt status returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseCheckinAttemptResponse'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/admin/system/state:
    get:
      tags: [AdminSystem]
      summary: Get system health summary
      security:
        - bearerAuth: []
      responses:
        '200':
          description: System health returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseSystemStateResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /api/admin/system/config:
    get:
      tags: [AdminSystem]
      summary: List editable system configuration
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Config items returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseSystemConfigItemList'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /api/admin/system/config/{configKey}:
    put:
      tags: [AdminSystem]
      summary: Update a system configuration item
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: configKey
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateSystemConfigRequest'
      responses:
        '200':
          description: Config item updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseSystemConfigItem'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    UserId:
      in: path
      name: userId
      required: true
      schema:
        type: string
        format: uuid
    SessionId:
      in: path
      name: sessionId
      required: true
      schema:
        type: string
        format: uuid
    PhotoId:
      in: path
      name: photoId
      required: true
      schema:
        type: string
        format: uuid
    AttemptId:
      in: path
      name: attemptId
      required: true
      schema:
        type: string
        format: uuid
  responses:
    BadRequest:
      description: Invalid request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Unauthorized:
      description: Authentication required or token invalid
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Forbidden:
      description: Access denied
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Conflict:
      description: Request conflicts with current state
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    TooManyRequests:
      description: Rate limited
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
  schemas:
    LoginRequest:
      type: object
      required: [username, password]
      properties:
        username:
          type: string
        password:
          type: string
          format: password
    LoginResponse:
      type: object
      required: [accessToken, tokenType, expiresIn, role, user]
      properties:
        accessToken:
          type: string
        tokenType:
          type: string
          example: Bearer
        expiresIn:
          type: integer
        role:
          type: string
          enum: [USER, ADMIN]
        user:
          $ref: '#/components/schemas/UserProfile'
    ApiResponseLogin:
      type: object
      required: [success, data, timestamp]
      properties:
        success:
          type: boolean
          enum: [true]
        data:
          $ref: '#/components/schemas/LoginResponse'
        error:
          nullable: true
        traceId:
          type: string
          nullable: true
        timestamp:
          type: string
          format: date-time
    ApiResponseUserProfile:
      type: object
      required: [success, data, timestamp]
      properties:
        success:
          type: boolean
          enum: [true]
        data:
          $ref: '#/components/schemas/UserProfile'
        error:
          nullable: true
        traceId:
          type: string
          nullable: true
        timestamp:
          type: string
          format: date-time
    ApiResponseFacePhotoSummary:
      type: object
      required: [success, data, timestamp]
      properties:
        success:
          type: boolean
          enum: [true]
        data:
          $ref: '#/components/schemas/FacePhotoSummary'
        error:
          nullable: true
        traceId:
          type: string
          nullable: true
        timestamp:
          type: string
          format: date-time
    ApiResponseFacePhotoSummaryList:
      type: object
      required: [success, data, timestamp]
      properties:
        success:
          type: boolean
          enum: [true]
        data:
          type: array
          items:
            $ref: '#/components/schemas/FacePhotoSummary'
        error:
          nullable: true
        traceId:
